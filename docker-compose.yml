version: "3.9"

services:

  db:
    image: postgres:15-alpine
    container_name: graphmind_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-graphmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graphmind_pass}
      POSTGRES_DB: ${POSTGRES_DB:-graphmind_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-graphmind} -d ${POSTGRES_DB:-graphmind_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - graphmind_net

  redis:
    image: redis:7-alpine
    container_name: graphmind_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - graphmind_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: graphmind_api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - graphmind_net

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: graphmind_worker
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    networks:
      - graphmind_net

volumes:
  postgres_data:

networks:
  graphmind_net:
    driver: bridge